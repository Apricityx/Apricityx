name: Metrics

on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
  push: { branches: ["main", "master"] }

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: 
      name: action
    steps:
      - name: Base card
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Apricityx
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_introduction: yes
          plugin_introduction_title: yes

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.languages.indepth.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Apricityx
          base: ""
          plugin_languages: yes
          plugin_languages_sections: most-used,recently-used
          plugin_languages_details: bytes-size,percentage,lines
          plugin_languages_limit: 8
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_indepth_custom: >-
            Apricityx/WorkshopAndroidDownloader,
            ModinMobileSTS/SlayTheAmethystModded,
            freude916/sts2-quickRestart

      - name: Featured repositories
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.repositories.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Apricityx
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: >-
            Apricityx/WorkshopAndroidDownloader,
            ModinMobileSTS/SlayTheAmethystModded,
            freude916/sts2-quickRestart
          plugin_repositories_affiliations: owner,collaborator,organization_member

      - name: Stargazers
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.stargazers.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Apricityx
          base: ""
          plugin_stargazers: yes

      - name: Notable contributions
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.notable.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Apricityx
          base: ""
          plugin_notable: yes
          plugin_notable_from: all
